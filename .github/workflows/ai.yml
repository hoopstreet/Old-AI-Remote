name: AI Builder

on:
  push:
    paths:
      - "memory/convo.md"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm install node-fetch@2

      - name: Run AI
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node src/agent/brain.js

      - name: Push changes
        run: |
          git config user.name "AI Bot"
          git config user.email "ai@bot.com"
          git add .
          git commit -m "🤖 AI generated update" || echo "No changes"
          git push
