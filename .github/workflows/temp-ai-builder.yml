name: TEMP AI BUILDER SELF HEAL ENGINE

on:
  push:
    paths:
      - "Temporary Builder/memory/convo.md"
      - "Temporary Builder/memory/convo2.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install
        run: |
          cd "Temporary Builder"
          npm install || true

      - name: Run Builder
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          node "Temporary Builder/Builder/runner.js"

      - name: Auto Commit Fixes
        run: |
          git config user.name "AI-BOT"
          git config user.email "ai@bot.local"
          git add .
          git diff --staged --quiet || git commit -m "🧠 AUTO SELF-HEAL"
          git pull --rebase origin main || true
          git push origin main || true
