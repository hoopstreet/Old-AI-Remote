name: TEMP AI DAG ENGINE

on:
  push:
    paths:
      - 'Temporary Builder/memory/convo.md'
      - 'Temporary Builder/memory/convo2.md'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Run DAG Engine
        run: |
          cd "Temporary Builder"
          npm install || true
          node Builder/runner.js

      - name: Commit Output
        run: |
          git config user.name "AI-BOT"
          git config user.email "bot@ai.dev"

          git add .

          git commit -m "🧠 AUTO DAG EXECUTION" || echo "no changes"

          git pull --rebase origin main || true
          git push origin main || true
