name: TEMP AI BUILDER v2

on:
  push:
    paths:
      - "Temporary Builder/memory/**"

  schedule:
    - cron: "*/10 * * * *"

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install
        run: |
          cd "Temporary Builder"
          npm install

      - name: Run Builder
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node "Temporary Builder/Builder/runner.js"

      - name: Auto PR Recovery
        uses: peter-evans/create-pull-request@v6
        with:
          title: "🧠 Auto Repair PR"
          branch: repair/${{ github.run_id }}

  rollback:
    runs-on: ubuntu-latest
    if: failure()

    steps:
      - uses: actions/checkout@v4

      - name: rollback last commit
        run: |
          git revert HEAD --no-edit || true
          git push origin main || true
