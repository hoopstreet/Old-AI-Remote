name: AI Remote Builder

on:
  push:
    paths:
      - "Temporary Builder/memory/convo.md"
      - "Temporary Builder/memory/convo2.md"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install

      - name: Run AI Builder DAG
        run: |
          node "Temporary Builder/Builder/runner.js"
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Commit generated output
        run: |
          git config user.name "ai-builder-bot"
          git config user.email "ai-builder@bot.com"

          git add .

          git commit -m "🧠 AI AUTO BUILD FROM TEMP BUILDER" || echo "no changes"

          git push
