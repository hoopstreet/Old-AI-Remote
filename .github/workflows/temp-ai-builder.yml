name: TEMP AI BUILDER (MASTER SYSTEM)

on:
  push:
    branches: [ main ]
    paths:
      - "Temporary Builder/**"
      - "convo.md"
      - "convo2.md"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install node-fetch

      - name: Run Builder
        run: node "Temporary Builder/Builder/runner.js"
