name: TEMP AI BUILDER (LOCKED SYSTEM)

on:
  push:
    branches: [ main ]
    paths:
      - "Temporary Builder/**"
      - "convo.md"
      - "convo2.md"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install node-fetch || true

      - name: Run AI Builder Engine
        run: node "Temporary Builder/Builder/runner.js"

      - name: Commit Generated Output
        run: |
          git config user.name "ai-builder"
          git config user.email "ai@bot.local"
          git add .
          git commit -m "🧠 AUTO BUILD FROM TEMP BUILDER" || true
          git push || true
