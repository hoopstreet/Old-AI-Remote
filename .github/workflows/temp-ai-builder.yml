name: TEMPORARY BUILDER SWARM V8

on:
  push:
    branches:
      - main
    paths:
      - "convo.md"
      - "convo2.md"
      - "Temporary Builder/**"

jobs:
  swarm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Run Swarm Engine
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          echo "🔥 SWARM TRIGGERED"
          node Temporary\ Builder/company/runtime/watch.js || true

      - name: Commit Memory Safely
        run: |
          git config user.name "ai-swarm"
          git config user.email "ai@swarm.local"

          git add Temporary\ Builder/company/memory/convo.md || true
          git add Temporary\ Builder/company/memory/convo2.md || true

          git commit -m "🧠 AUTO MEMORY UPDATE" || true
          git push || true
