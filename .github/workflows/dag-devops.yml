name: 🧠 Autonomous DAG DevOps Brain

on:
  push:
    paths:
      - "Temporary Builder/memory/**"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  dag-engine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install deps
        run: npm install node-fetch

      - name: Run DAG Brain Engine
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node "Temporary Builder/Builder/dag-runner.js"

      - name: Create Safe PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ai/dag-brain
          title: "🧠 DAG DevOps Brain Update"
          commit-message: "autonomous DAG execution update"
          body: "Generated by DAG DevOps Brain"
